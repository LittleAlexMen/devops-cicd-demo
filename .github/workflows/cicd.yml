name: CI

on:
  push:
    branches: [ dev, master ]
  pull_request:
    branches: [ master ]

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install pylint
        run: pip install pylint
      - name: Lint application
        run: pylint --fail-under=8 --disable=C0114,C0115,C0116 server/application.py || true

  unit-tests:
    needs: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r server/requirements.txt
      - name: Run tests
        run: pytest server/test_application.py

  build-test:
    needs: unit-tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t test-image ./server
      - name: Run container
        run: docker run -d --name test-app -p 8000:8000 test-image
      - name: Wait for server
        run: sleep 5
      - name: Test web server
        run: curl --fail http://localhost:8000
      - name: Cleanup
        run: docker rm -f test-app
