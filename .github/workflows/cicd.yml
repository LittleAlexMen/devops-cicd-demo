name: CI  # имя workflow, отображается в GitHub Actions

on:  # события, запускающие workflow
  push:
    branches: [ dev, master ]   # при пуше в dev или master
  pull_request:
    branches: [ master ]        # при создании PR в master

jobs:  # задачи, выполняемые последовательно (или параллельно, если без needs)
  lint:
    runs-on: ubuntu-24.04       # виртуальная машина GitHub
    steps:
      - uses: actions/checkout@v4   # клонирование репозитория
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install pylint
        run: pip install pylint
      - name: Lint application
        run: pylint --fail-under=8 --disable=C0114,C0115,C0116 server/application.py || true
        # --disable отключает проверки docstring, чтобы не было ошибок из-за отсутствия комментариев
        # || true не даёт workflow завершиться с ошибкой, но лучше убрать и исправить код

  unit-tests:
    needs: lint                  # запускается только после успешного lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          cd server
          pip install -r requirements.txt
      - name: Run tests
        run: |
          cd server
          pytest test_application.py

  build-test:
    needs: unit-tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t test-image ./server
      - name: Run container
        run: docker run -d --name test-app -p 8000:8000 test-image
      - name: Wait for server
        run: sleep 5
      - name: Test web server
        run: curl --fail http://localhost:8000   # проверяем, что сервер отвечает
      - name: Cleanup
        run: docker rm -f test-app
